<header class="flex h-16 items-center px-6 justify-between">
  <div>
    <button
      (click)="onToggleSidebar()"
      class="p-2 hover:bg-white/10 rounded-lg transition-colors text-zinc-400 hover:text-white"
    >
      <lucide-icon [img]="menuIcon" class="w-6 h-6 stroke-[1.5px]"></lucide-icon>
    </button>

    <span class="ms-4 font-bold text-xl tracking-tight text-white">Nuvinary</span>
  </div>

  <div class="relative">
    <button
      (click)="toggleMenu()"
      class="w-10 h-10 rounded-full bg-brand border border-brand/20 flex items-center justify-center shadow-lg hover:bg-brand-light transition-all focus:outline-none"
    >
      <span class="text-white font-bold text-md tracking-widest mt-0.5">
        {{ userInitials() }}
      </span>
    </button>

    @if (isMenuOpen) {
      <div
        class="absolute right-0 mt-3 w-48 bg-white rounded-2xl shadow-2xl py-3 z-50 border border-indigo-100 animate-in fade-in zoom-in duration-300"
      >
        <div class="px-4 py-2 border-b border-gray-50">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">
            Eingeloggt als
          </p>
          <p class="text-sm font-bold text-indigo-950 truncate">
            {{ authUser()?.firstName }} {{ authUser()?.lastName }}
          </p>
        </div>

        <button
          class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition-colors"
        >
          Profil Einstellungen
        </button>

        <button
          class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors"
          (click)="onLogOut()"
        >
          Abmelden
        </button>
      </div>
    }
  </div>
</header>
