<div class="flex-1 select-none overflow-y-auto px-6 py-4 custom-scrollbar">
  <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-6">
    @for (creation of creationList(); track creation.id; let i = $index) {
      <div
        [draggable]="allowDrag()"
        (dragstart)="onDragStart($event, creation, i)"
        (dragend)="onDragEnd()"
        class="transition-transform relative group"
        [class.opacity-40]="activeCreation()?.id === creation.id"
        [class.active:cursor-grabbing]="allowDrag()"
        [class.hover:scale-105]="allowDrag()"
        [class.cursor-grab]="allowDrag()"
      >
        @if (allowDelete()) {
          <button
            (click)="onDeleteCreation(creation)"
            class="absolute top-3 right-3 z-30 p-2 rounded-xl bg-zinc-900/10 backdrop-blur-md border border-white/20 text-zinc-100 shadow-inner opacity-0 group-hover:opacity-100 transition-all duration-300 hover:text-red-500 hover:border-red-100 hover:bg-red-50 active:scale-90"
          >
            <lucide-icon [img]="icons.trashIcon" class="w-4 h-4"></lucide-icon>
          </button>
        }

        <app-creation-card [creation]="creation"></app-creation-card>

        @if (allowDrag()) {
          <div
            #dragElement
            class="fixed -top-250 w-20 h-20 rounded-xl overflow-hidden border-2 border-[#7c6db2] z-[-1]"
          >
            <img
              [src]="creation.url"
              [alt]="creation.title"
              class="w-full h-full object-cover opacity-80"
            />
          </div>
        }
      </div>
    } @empty {
      <div class="col-span-full py-20 flex flex-col items-center justify-center text-zinc-400">
        <lucide-icon [img]="icons.searchIcon" class="w-12 h-12 opacity-20 mb-4"></lucide-icon>
        <p class="font-bold uppercase tracking-widest text-xs">No assets found</p>
      </div>
    }
  </div>
</div>
