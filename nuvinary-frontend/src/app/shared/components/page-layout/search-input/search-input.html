<div
  class="flex items-center bg-[#f9f8fc] border border-zinc-200 rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-text-main/20 transition-all"
>
  <lucide-icon [img]="icons.searchIcon" class="w-4 h-4 text-zinc-400"></lucide-icon>
  <input
    #searchInput
    type="text"
    [value]="query()"
    (input)="query.set(searchInput.value)"
    placeholder="Search assets..."
    class="ml-3 flex-1 bg-transparent border-none text-sm font-semibold text-zinc-700 outline-none"
  />
  @if (query()) {
    <button (click)="query.set('')" class="text-zinc-400 hover:text-text-main transition-colors">
      <lucide-icon [img]="icons.closeIcon" class="w-4 h-4"></lucide-icon>
    </button>
  }
</div>
