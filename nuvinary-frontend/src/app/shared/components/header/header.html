<header
  [ngClass]="
    isLandingPage()
      ? 'fixed top-0 right-0 left-0 z-50 border-white-soft'
      : 'bg-header-bg border-header-border'
  "
  class="flex items-center justify-between w-full max-w-app-max-width p-4 px-8 border-b shadow-lg"
>
  <div class="flex items-center gap-2 cursor-pointer" [routerLink]="['/']">
    <div
      class="w-8 h-8 rounded-lg bg-linear-to-tr from-orange-500 to-yellow-400 shadow-inner"
    ></div>
    <span class="font-bold text-xl text-white">Nuvinary</span>
  </div>
  @if (isLandingPage()) {
    <div class="flex gap-4 max-h-16">
      <app-button
        label="Sign In"
        [fullWidth]="false"
        variant="ghost"
        [routerLink]="['/auth/signin']"
      ></app-button>

      <app-button label="Sign Up" [routerLink]="['/auth/signup']" [fullWidth]="false"></app-button>
    </div>
  }
</header>
