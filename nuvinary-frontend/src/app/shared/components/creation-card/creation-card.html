<button
  (click)="onOpenDetailsDialog()"
  [disabled]="creation().status !== 'completed'"
  class="group relative overflow-hidden w-full aspect-4/5 rounded-3xl border border-slate-200 bg-slate-100 shadow-md transition-all duration-500 hover:shadow-2xl hover:shadow-primary-subtle"
>
  @if (creation().status === 'completed') {
    <img
      [alt]="creation().title"
      [src]="creation().url"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
    />
  } @else {
    <div
      class="flex items-center justify-center w-full h-full italic text-[10px] text-slate-400 uppercase bg-slate-200"
    >
      {{ creation().status }}...
    </div>
  }

  @if (creation().status === 'completed') {
    <div
      class="absolute inset-0 flex flex-col justify-end p-5 opacity-0 bg-linear-to-t from-black/60 via-black/0 to-transparent transition-all duration-300 group-hover:opacity-100"
    >
      <div class="transition-transform duration-300 translate-y-4 group-hover:translate-y-0">
        <h4 class="font-bold text-sm text-white tracking-tight">
          {{ creation().title }}
        </h4>
      </div>
    </div>
  }

  <div
    class="absolute top-4 right-4 opacity-0 scale-75 transition-all duration-300 group-hover:opacity-100 group-hover:scale-100"
  ></div>
</button>
