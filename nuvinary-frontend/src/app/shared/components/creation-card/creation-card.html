<button
  (click)="onOpenDetails()"
  [disabled]="creation().status !== 'completed'"
  class="group relative w-full aspect-4/5 bg-zinc-100 rounded-3xl border border-zinc-200 shadow-sm shadow-[#bbb2d8]/20 hover:shadow-2xl hover:shadow-[#7c6db2]/30 transition-all duration-500 overflow-hidden"
>
  @if (creation().status === 'completed') {
    <img
      [alt]="creation().title"
      [src]="creation().url"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
    />
  } @else {
    <div
      class="w-full h-full bg-zinc-200 flex items-center justify-center italic text-zinc-400 text-[10px] uppercase"
    >
      {{ creation().status }}...
    </div>
  }
  @if (creation().status === 'completed') {
    <div
      class="absolute inset-0 bg-linear-to-t from-black/60 via-black/0 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end p-5"
    >
      <div class="translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
        <h4 class="text-white font-bold text-sm tracking-tight">
          {{ creation().title }}
        </h4>
      </div>
    </div>
  }
  <div
    class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity scale-75 group-hover:scale-100 duration-300"
  ></div>
</button>
