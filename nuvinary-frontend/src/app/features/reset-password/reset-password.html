<section class="flex flex-col justify-between min-h-screen">
  <app-header></app-header>
  <main
    class="mx-auto mb-50 w-full bg-white max-w-xl p-8 rounded-4xl border border-zinc-200 bg-card-bg shadow-2xl"
  >
    <h2 class="mb-6 font-black text-3xl text-center text-text-main tracking-tight">Welcome Back</h2>
    <p class="mb-8 text-center text-sm text-zinc-600">
      We're glad to see you again. Enter your credentials to get back into the action.
    </p>

    <form (submit)="onSubmit($event)" class="flex flex-col gap-4">
      <app-form-input
        [field]="resetPasswordForm.code"
        label="Code"
        placeholder="Enter 6-digit code"
        type="text"
      >
        <button
          type="button"
          [disabled]="!canResend()"
          (click)="onSendCode()"
          class="px-8 py-3 rounded-xl font-bold text-sm transition-all disabled:bg-gray-600/20 bg-text-main text-white hover:bg-text-main-hover active:scale-95 shadow-lg"
        >
          {{ resendButtonLabel() }}
        </button>
      </app-form-input>

      <app-form-input
        [field]="resetPasswordForm.password"
        label="Password"
        placeholder="Enter your new password"
        type="password"
      ></app-form-input>

      <app-form-input
        [field]="resetPasswordForm.confirmPassword"
        label="Confirm Password"
        placeholder="Confirm your new password"
        type="password"
      ></app-form-input>

      <div class="flex">
        <button
          type="submit"
          [disabled]="resetPasswordForm().invalid()"
          class="flex-1 mt-4 py-3 rounded-xl font-bold transition-all shadow-lg enabled:bg-brand enabled:text-white enabled:shadow-brand/20 enabled:hover:bg-brand-light enabled:active:scale-95 disabled:bg-gray-300 disabled:text-white disabled:shadow-none"
        >
          Reset Password
        </button>
      </div>
    </form>

    <div class="mt-8 text-center">
      <p class="text-sm text-text">
        Back to
        <a [routerLink]="['/signin']" class="ml-1 font-bold text-brand hover:text-brand-light">
          Sign In
        </a>
      </p>
    </div>
  </main>
  <app-footer></app-footer>
</section>
