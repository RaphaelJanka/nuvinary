<h2 class="mb-6 font-black text-3xl text-center text-text-main tracking-tight">Welcome Back</h2>
<p class="mb-8 text-center text-sm text-zinc-600">
  We're glad to see you again. Enter your credentials to get back into the action.
</p>

<form (submit)="onSubmit($event)" class="flex flex-col gap-4">
  <app-form-input [field]="loginForm.email" purpose="email"></app-form-input>
  <app-form-input [field]="loginForm.password" purpose="password"></app-form-input>

  <a
    class="flex text-[11px] justify-end -mt-2 me-4 font-semibold text-zinc-600 hover:text-brand transition-colors"
    [routerLink]="['/auth/reset-password']"
  >
    Forgot Password?
  </a>

  <app-button [disabled]="loginForm().invalid()" label="Sign In" type="submit"></app-button>
</form>

<div class="mt-8 text-center">
  <p class="text-sm text-text">
    New to Nuvinary?
    <a [routerLink]="['/auth/signup']" class="ml-1 font-bold text-brand hover:text-brand-light">
      Create Account
    </a>
  </p>
</div>
