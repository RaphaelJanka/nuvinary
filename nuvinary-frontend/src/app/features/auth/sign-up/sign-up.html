<h1 class="mb-6 font-black text-4xl text-center text-primary tracking-tight">Join the Community</h1>
<p class="mb-8 text-center text-sm">Create your account and start your journey with us today.</p>

@if (!pendingUserEmail()) {
  <form (submit)="onSignUp($event)" class="flex flex-col gap-4">
    <div class="grid grid-cols-2 gap-6">
      <app-form-input
        [field]="signUpForm.firstName"
        purpose="firstName"
        type="text"
      ></app-form-input>
      <app-form-input [field]="signUpForm.lastName" purpose="lastName"></app-form-input>
    </div>

    <app-form-input [field]="signUpForm.email" purpose="email"></app-form-input>

    <app-form-input [field]="signUpForm.password" purpose="password"></app-form-input>

    <app-form-input [field]="signUpForm.confirmPassword" purpose="confirmPassword"></app-form-input>

    <app-button [disabled]="signUpForm().invalid()" type="submit" label="Next"></app-button>
  </form>
} @else {
  <form (submit)="onConfirm($event)" class="flex flex-col gap-4">
    <app-form-input [field]="confirmForm.code" purpose="code">
      <app-button
        [disabled]="!canResend()"
        (click)="onResendCode()"
        [label]="resendButtonLabel()"
        variant="secondary"
      >
      </app-button>
    </app-form-input>

    <app-button
      [disabled]="confirmForm().invalid()"
      type="submit"
      label="Confirm & Sign Up"
    ></app-button>
  </form>
}

<div class="mt-8 text-center">
  <p class="text-sm text-text">
    Already have an account?
    <a [routerLink]="['/auth/signin']" class="font-bold text-accent hover:text-accent-light">
      Sign In
    </a>
  </p>
</div>
