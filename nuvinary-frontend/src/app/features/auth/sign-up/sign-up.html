<h2 class="mb-6 font-black text-3xl text-center text-text-main tracking-tight">
  Join the Community
</h2>
<p class="mb-8 text-center text-sm text-zinc-600">
  Create your account and start your journey with us today.
</p>

<form (submit)="onSubmit($event)" class="flex flex-col gap-4">
  <div class="grid grid-cols-2 gap-6">
    <app-form-input
      [field]="signUpForm.firstName"
      label="First Name"
      placeholder="Enter your first name"
      type="text"
    ></app-form-input>

    <app-form-input
      [field]="signUpForm.lastName"
      label="Last Name"
      placeholder="Enter your last name"
      type="text"
    ></app-form-input>
  </div>

  <app-form-input
    [field]="signUpForm.email"
    label="Email"
    placeholder="Enter your email address"
    type="email"
  ></app-form-input>

  <app-form-input
    [field]="signUpForm.code"
    label="Code"
    placeholder="Enter 6-digit code"
    type="text"
  >
    <button
      type="button"
      [disabled]="!canResend()"
      (click)="onSendCode()"
      class="px-8 py-3 rounded-xl font-bold text-sm transition-all disabled:bg-gray-600/20 bg-text-main text-white hover:bg-text-main-hover active:scale-95 shadow-lg"
    >
      {{ resendButtonLabel() }}
    </button>
  </app-form-input>

  <app-form-input
    [field]="signUpForm.password"
    label="Password"
    placeholder="Enter your password"
    type="password"
  ></app-form-input>

  <app-form-input
    [field]="signUpForm.confirmPassword"
    label="Confirm Password"
    placeholder="Confirm your password"
    type="password"
  ></app-form-input>

  <div class="flex flex-col gap-3">
    <button
      type="submit"
      [ngClass]="{
        'bg-brand shadow-lg shadow-brand/20 hover:bg-brand-light active:scale-95 duration-300':
          signUpForm().valid(),
        'bg-gray-300 shadow-none duration-0': signUpForm().invalid(),
      }"
      class="flex-1 mt-4 py-3 rounded-xl font-bold text-white transition-all"
    >
      Sign Up
    </button>
  </div>
</form>

<div class="mt-8 text-center">
  <p class="text-sm text-text">
    Already have an account?
    <a [routerLink]="['/auth/signin']" class="font-bold text-brand hover:text-brand-light">
      Sign In
    </a>
  </p>
</div>
