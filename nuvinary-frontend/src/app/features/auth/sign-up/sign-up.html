<h2 class="mb-6 font-black text-3xl text-center text-text-main tracking-tight">
  Join the Community
</h2>
<p class="mb-8 text-center text-sm text-zinc-600">
  Create your account and start your journey with us today.
</p>

<form (submit)="onSubmit($event)" class="flex flex-col gap-4">
  <div class="grid grid-cols-2 gap-6">
    <app-form-input
      [field]="signUpForm.firstName"
      label="First Name"
      placeholder="Enter your first name"
      type="text"
    ></app-form-input>

    <app-form-input
      [field]="signUpForm.lastName"
      label="Last Name"
      placeholder="Enter your last name"
      type="text"
    ></app-form-input>
  </div>

  <app-form-input
    [field]="signUpForm.email"
    label="Email"
    placeholder="Enter your email address"
    type="email"
  ></app-form-input>

  <app-form-input
    [field]="signUpForm.code"
    label="Code"
    placeholder="Enter 6-digit code"
    type="text"
  >
    <app-button
      [disabled]="!canResend()"
      (click)="onSendCode()"
      [label]="resendButtonLabel()"
      variant="secondary"
    >
    </app-button>
  </app-form-input>

  <app-form-input
    [field]="signUpForm.password"
    label="Password"
    placeholder="Enter your password"
    type="password"
  ></app-form-input>

  <app-form-input
    [field]="signUpForm.confirmPassword"
    label="Confirm Password"
    placeholder="Confirm your password"
    type="password"
  ></app-form-input>

  <app-button [disabled]="signUpForm().invalid()" type="submit" label="Sign Up"></app-button>
</form>

<div class="mt-8 text-center">
  <p class="text-sm text-text">
    Already have an account?
    <a [routerLink]="['/auth/signin']" class="font-bold text-brand hover:text-brand-light">
      Sign In
    </a>
  </p>
</div>
