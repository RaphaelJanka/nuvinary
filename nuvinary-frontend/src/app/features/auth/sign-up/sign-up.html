<h2 class="mb-6 font-black text-3xl text-center text-primary tracking-tight">Join the Community</h2>
<p class="mb-8 text-center text-sm text-slate-600">
  Create your account and start your journey with us today.
</p>

<form (submit)="onSubmit($event)" class="flex flex-col gap-4">
  <div class="grid grid-cols-2 gap-6">
    <app-form-input [field]="signUpForm.firstName" purpose="firstName" type="text"></app-form-input>
    <app-form-input [field]="signUpForm.lastName" purpose="lastName"></app-form-input>
  </div>

  <app-form-input [field]="signUpForm.email" purpose="email"></app-form-input>

  <app-form-input [field]="signUpForm.code" purpose="code">
    <app-button
      [disabled]="!canResend()"
      (click)="onSendCode()"
      [label]="resendButtonLabel()"
      variant="secondary"
    >
    </app-button>
  </app-form-input>

  <app-form-input [field]="signUpForm.password" purpose="password"></app-form-input>

  <app-form-input [field]="signUpForm.confirmPassword" purpose="confirmPassword"></app-form-input>

  <app-button [disabled]="signUpForm().invalid()" type="submit" label="Sign Up"></app-button>
</form>

<div class="mt-8 text-center">
  <p class="text-sm text-text">
    Already have an account?
    <a [routerLink]="['/auth/signin']" class="font-bold text-accent hover:text-accent-light">
      Sign In
    </a>
  </p>
</div>
