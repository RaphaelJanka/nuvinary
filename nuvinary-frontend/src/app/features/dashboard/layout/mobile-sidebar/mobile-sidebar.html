@if (isOpen()) {
  <div class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm animate-in fade-in duration-300">
    <div
      class="fixed inset-y-0 left-0 w-full max-w-xs pt-6 bg-layer shadow-2xl flex flex-col justify-between animate-in slide-in-from-left duration-300"
    >
      <div class="px-6">
        <div class="flex items-center justify-between border-b border-border-gentle pb-4">
          <div class="flex items-center gap-3">
            <img src="logos/nuvinary-icon.svg" alt="nuvinary" class="w-auto h-8" />
            <h1 class="font-bold text-primary tracking-tight">Dashboard</h1>
          </div>

          <button
            (click)="onClose()"
            class="p-1.5 md:p-2 rounded-full border border-border-gentle bg-white-strong shadow-sm backdrop-blur-md transition-colors group hover:bg-bg-light"
          >
            <lucide-icon
              [img]="closeIcon"
              class="w-4 h-4 md:w-5 md:h-5 transition-transform duration-300 group-hover:rotate-90 group-hover:text-primary"
            ></lucide-icon>
          </button>
        </div>

        <nav class="flex flex-col py-2">
          @for (item of dashboardNavItems; track item) {
            <a
              [routerLink]="item.route"
              (click)="onClose()"
              class="group flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm hover:bg-sidebar-hover hover:text-white transition-all"
            >
              <lucide-icon
                class="shrink-0 w-4 h-4 xl:w-5 xl:h-5 group-hover:scale-110 transition-transform duration-200"
                [img]="item.icon"
              ></lucide-icon>
              <h1
                class="overflow-hidden whitespace-nowrap group-hover:translate-x-2 transition-transform duration-300"
              >
                {{ item.label }}
              </h1>
            </a>
          }
        </nav>
      </div>

      <div>
        <nav class="flex flex-col px-6 gap-4 text-xs font-medium">
          @for (item of legalNavItems; track $index) {
            <a
              [routerLink]="item.route"
              class="ps-5 hover:text-primary transition-all duration-200"
            >
              <span class="whitespace-nowrap transition-all duration-300">
                {{ item.label }}
              </span>
            </a>
          }
        </nav>

        <div class="mt-3 p-4 text-xs bg-primary text-white">
          <p class="overflow-hidden ml-1 whitespace-nowrap">© 2023 Nuvinary</p>
        </div>
      </div>
    </div>
  </div>
}
