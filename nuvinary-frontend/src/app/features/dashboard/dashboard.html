<div class="flex flex-col flex-1 screen-low:h-screen">
  <app-main-header></app-main-header>

  <div class="flex flex-1 min-h-0">
    @if (!isMobile()) {
      <app-sidebar [class.w-64]="!isCollapsed()" [class.w-10]="isCollapsed()" />
    } @else {
      <app-mobile-sidebar></app-mobile-sidebar>
    }

    <main
      class="flex p-4 flex-1 mb-10 lg:mb-0 mx-4 mt-2 lg:mt-0 lg:mx-0 lg:me-10 bg-layer rounded-b-2xl lg:rounded-b-none rounded-t-2xl transition-all duration-300"
    >
      <router-outlet />
    </main>
  </div>
</div>
