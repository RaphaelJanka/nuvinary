<header
  class="h-16 px-6 border-b border-[#bbb2d8]/30 bg-[#7c6db2] flex justify-between items-center shadow-lg shadow-[#7c6db2]/20"
>
  <h3 class="font-black text-white text-sm uppercase tracking-widest">Collections</h3>

  <button
    class="w-9 h-9 flex items-center justify-center bg-white/20 hover:bg-white text-white hover:text-[#7c6db2] rounded-xl transition-all duration-300"
  >
    <lucide-icon [img]="icons.plusIcon" class="w-5 h-5"></lucide-icon>
  </button>
</header>

<main class="flex-1 overflow-y-auto p-4 space-y-3">
  @for (album of ['Vacation', 'Work', 'Inspiration']; track album) {
    <div
      class="group border border-zinc-200 bg-white rounded-lg p-3 hover:border-[#7c6db2] transition-all"
    >
      <div class="flex items-center gap-3 cursor-pointer">
        <lucide-icon [img]="icons.folderIcon" class="w-5 h-5 text-[#9b8fbc]"></lucide-icon>
        <span class="font-medium text-sm text-zinc-600">{{ album }}</span>
        <span class="ml-auto text-xs text-zinc-400">12</span>
      </div>
    </div>
  }
</main>
