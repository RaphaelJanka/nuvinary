<div class="flex h-full w-full gap-4">
  <section class="flex-3">
    <app-page-layout [title]="'My Gallery'">
      <app-search-input searchHeader [(query)]="searchQuery" class="flex-1"></app-search-input>
      <app-creation-grid
        [creationList]="filteredCreations()"
        [allowDrag]="true"
        [allowDelete]="true"
      ></app-creation-grid>
    </app-page-layout>
  </section>

  <section
    class="flex flex-col flex-1 min-w-75 overflow-hidden rounded-xl border border-zinc-200 bg-white/50"
  >
    <app-collections></app-collections>
  </section>
</div>
