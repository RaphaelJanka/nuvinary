<div class="flex h-full w-full gap-4">
  <section
    class="flex-3 flex flex-col min-w-0 bg-white/50 rounded-xl border border-zinc-200 overflow-hidden"
  >
    <header
      class="h-16 shadow-[0_4px_20px_-10px_rgba(124,109,178,0.2)] px-6 border-b border-[#7c6db2]/20 bg-white flex items-center gap-4"
    >
      <div
        class="flex items-center gap-2 px-3 py-1.5 bg-sheet-bg rounded-xl border border-[#7c6db2]/10"
      >
        <span class="text-[10px] font-black text-[#7c6db2] uppercase tracking-wider"
          >My Gallery</span
        >
      </div>

      <div
        class="flex-1 flex items-center bg-[#f9f8fc] border border-zinc-200 rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-[#7c6db2]/20 focus-within:border-[#7c6db2] transition-all"
      >
        <lucide-icon [img]="searchIcon" class="w-4 h-4 text-zinc-400"></lucide-icon>
        <input
          type="text"
          placeholder="Search assets..."
          class="ml-3 flex-1 bg-transparent border-none text-sm font-semibold text-zinc-700 placeholder-zinc-400 focus:outline-none"
        />
      </div>
    </header>

    <main class="flex-1 select-none overflow-y-auto px-6 py-4 custom-scrollbar">
      <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-6">
        @for (creation of creationList(); track creation.id) {
          <app-creation-card
            [creation]="creation"
            (openDetails)="onOpenDetails($event)"
          ></app-creation-card>
        }
      </div>
    </main>
  </section>

  <section
    class="flex-1 min-w-75 flex flex-col bg-white/50 rounded-xl border border-zinc-200 overflow-hidden"
  >
    <header
      class="h-16 px-6 border-b border-[#bbb2d8]/30 bg-[#7c6db2] flex justify-between items-center shadow-lg shadow-[#7c6db2]/20"
    >
      <h3 class="font-black text-white text-sm uppercase tracking-widest">Collections</h3>

      <button
        class="w-9 h-9 flex items-center justify-center bg-white/20 hover:bg-white text-white hover:text-[#7c6db2] rounded-xl transition-all duration-300"
      >
        <lucide-icon [img]="plusIcon" class="w-5 h-5"></lucide-icon>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-3">
      @for (album of ['Vacation', 'Work', 'Inspiration']; track album) {
        <div
          class="group border border-zinc-200 bg-white rounded-lg p-3 hover:border-[#7c6db2] transition-all"
        >
          <div class="flex items-center gap-3 cursor-pointer">
            <lucide-icon [img]="folderIcon" class="w-5 h-5 text-[#9b8fbc]"></lucide-icon>
            <span class="font-medium text-sm text-zinc-600">{{ album }}</span>
            <span class="ml-auto text-xs text-zinc-400">12</span>
          </div>
        </div>
      }
    </main>
  </section>
</div>
