<div class="flex flex-1 gap-4 flex-col md:flex-row">
  <section class="flex-1">
    <app-page-layout [title]="'My Gallery'">
      <app-search-input searchHeader [(query)]="searchQuery" class="flex-1"></app-search-input>
      <app-creation-grid
        [creationList]="filteredCreations()"
        [allowDrag]="true"
        [allowDelete]="true"
      ></app-creation-grid>
    </app-page-layout>
  </section>

  <section
    class="overflow-y-hidden w-full max-w-70 lg:max-w-80 xl:max-w-90 rounded-xl border border-border-gentle bg-white-medium"
  >
    <app-collections></app-collections>
  </section>
</div>
