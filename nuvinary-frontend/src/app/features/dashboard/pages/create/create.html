<section class="flex-1">
  <app-page-layout title="Create">
    <main class="flex justify-center my-10 xl:my-20">
      <form
        (submit)="onSubmit($event)"
        class="flex flex-col xl:gap-16 w-full max-w-70 md:max-w-lg xl:max-w-2xl"
      >
        <div class="flex flex-col gap-6 min-h-40">
          <h1
            class="font-bold text-xl md:text-3xl xl:text-5xl leading-relaxed text-gradient-accent"
          >
            {{ displayedUserGreeting() }}
          </h1>
          <div class="h-20">
            <span class="font-bold text-sm md:text-base xl:text-3xl leading-tight">
              @if (isThinking()) {
                <span class="flex gap-1 text-line">
                  <span class="animate-dot">.</span>
                  <span class="animate-dot dot-2">.</span>
                  <span class="animate-dot dot-3">.</span>
                </span>
              } @else {
                <span class="text-gradient">
                  {{ displayedText() }}
                </span>

                @if (isTyping()) {
                  <span
                    class="inline-block w-0.75 h-[0.9em] ml-1 translate-y-[0.1em] bg-line animate-pulse"
                  ></span>
                }
              }
            </span>
          </div>
        </div>

        @if (currentStep() === 'prompt') {
          <div class="animate-in fade-in slide-in-from-bottom-4 duration-1200">
            <textarea
              [formField]="creationForm.prompt"
              class="block w-full p-4 md:p-6 font-semibold text-[10px] md:text-base xl:text-lg rounded-3xl border border-border-gentle bg-white shadow-sm resize-none outline-none focus:ring-4 focus:ring-primary-subtle transition-all"
              rows="4"
              placeholder="e.g. A cybernetic owl with glowing blue eyes in a dark forest..."
            >
            </textarea>

            <div class="grid grid-cols-[1fr_auto] mt-4">
              <div></div>
              <app-button
                label="Next"
                [disabled]="creationForm.prompt().invalid() || isTyping()"
                (click)="onSetTitle()"
                variant="secondary"
                [icon]="icons.arrowRightIcon"
              ></app-button>
            </div>
          </div>
        }

        @if (currentStep() === 'title') {
          <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
            <input
              type="text"
              [formField]="creationForm.title"
              class="w-full p-4 xl:p-6 font-semibold text-[10px] xl:text-lg rounded-3xl border border-border-gentle bg-white shadow-sm outline-none placeholder:text-text-gentle focus:ring-1 focus:ring-primary-subtle transition-all"
              placeholder="Enter a title (or leave blank for magic)..."
            />

            <div class="grid grid-cols-[1fr_auto] mt-4">
              <div>
                <button
                  (click)="onBack()"
                  type="button"
                  class="px-6 py-3 text-xs md:text-base font-bold text-text-gentle disabled:opacity-30 hover:text-text-emphasis transition-colors"
                  [disabled]="isTyping()"
                >
                  Back
                </button>
              </div>

              <app-button
                label="Generate"
                [disabled]="creationForm.prompt().invalid() || isTyping()"
                type="submit"
                variant="secondary"
                [icon]="icons.cloudUploadIcon"
                iconPosition="left"
              ></app-button>
            </div>
          </div>
        }
      </form>
    </main>
  </app-page-layout>
</section>
