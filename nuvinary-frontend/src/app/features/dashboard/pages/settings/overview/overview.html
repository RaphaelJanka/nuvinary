<app-page-layout [title]="'Account Overview'">
  <section class="flex justify-center p-6 sm:p-12">
    <div
      class="w-full max-w-[75%] bg-white border border-white/5 rounded-4xl shadow-2xl p-8 sm:p-12"
    >
      <p class="text-xs text-zinc-500 font-medium mb-8">
        Account-ID: <span class="font-black text-sm text-text-main">{{ user()?.uid }}</span>
      </p>
      <div class="flex justify-between items-start mb-10">
        <div>
          <h2 class="text-xl font-bold text-text-main tracking-tight">Activity</h2>
          <p class="text-xs text-zinc-500 font-medium">Creation volume</p>
        </div>
        <div class="text-right">
          <span class="text-2xl font-black text-text-main">{{ usedCredits }}</span>
          <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-tighter">
            Total spent credits
          </p>
        </div>
      </div>
      <div class="h-44 w-full mb-12">
        <canvas baseChart [data]="chartData()" [options]="chartOptions" [type]="'line'"> </canvas>
      </div>

      <div class="flex flex-col pt-10 border-t border-zinc-600/30">
        <div class="flex flex-col items-center sm:items-start">
          <span class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.25em] mb-2">
            Remaining Balance
          </span>
          <div
            class="px-6 py-3 bg-white/5 border border-brand/30 rounded-2xl flex items-baseline gap-3 shadow-inner group transition-colors"
          >
            <span class="text-4xl font-black text-text-main tracking-tighter">
              {{ user()?.credits }}
            </span>
            <span class="text-sm font-bold text-text-main tracking-tighter">Credits</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</app-page-layout>
