<div class="flex-1">
  <app-page-layout [title]="'Account Overview'">
    <section class="flex justify-center px-4 py-8 sm:p-12">
      <div
        class="xs:w-full w-[75vw] xs:max-w-[75%] bg-white border border-white-glass rounded-4xl shadow-2xl p-8 sm:p-12"
      >
        <p class="text-xs font-medium mb-8">
          Account-ID: <span class="font-black text-sm text-primary">{{ user()?.uid }}</span>
        </p>
        <div class="flex flex-col justify-between xs:items-start xs:flex-row mb-10 gap-6 xs:gap-0">
          <div>
            <h1 class="text-2xl font-bold text-primary">Activity</h1>
            <p class="text-xs font-medium">Creation volume</p>
          </div>
          <div class="xs:text-right">
            <span class="text-2xl font-black text-primary">{{ usedCredits }}</span>
            <p class="text-[9px] font-bold uppercase">Total spent credits</p>
          </div>
        </div>
        <div class="h-44 w-full mb-12">
          <canvas baseChart [data]="chartData()" [options]="chartOptions" [type]="'line'"> </canvas>
        </div>

        <div class="flex flex-col pt-10 border-t border-border-gentle">
          <div class="flex flex-col items-center sm:items-start">
            <span class="text-[10px] font-extrabold uppercase tracking-[0.25em] mb-2">
              Remaining Balance
            </span>
            <div
              class="px-6 py-3 bg-white-glass border border-accent-subtle rounded-2xl flex items-baseline gap-3 shadow-inner group transition-colors"
            >
              <span class="text-4xl font-black text-primary tracking-tighter">
                {{ user()?.credits }}
              </span>
              <span class="text-sm font-bold text-primary tracking-tighter">Credits</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </app-page-layout>
</div>
