<section class="flex-1">
  <app-page-layout [title]="'Profile Settings'">
    <div class="flex justify-center p-4 sm:p-12">
      <div
        class="w-full max-w-2xl bg-white border border-white-glass rounded-[2.5rem] shadow-2xl px-4 py-8 xs:p-12"
      >
        <div class="flex flex-col items-center mb-12">
          <div
            class="relative w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-white-glass transition-all duration-500"
            [style.backgroundColor]="selectedAvatarColor()"
          >
            <span class="text-3xl font-black text-white tracking-tighter">
              {{ user() | userInitial }}
            </span>
            <div
              class="absolute inset-0 rounded-full bg-linear-to-b from-white-glass to-transparent"
            ></div>
          </div>

          <p class="mt-6 mb-4 text-xs font-bold text-accent uppercase tracking-widest">
            Choose your identity color
          </p>

          <div class="flex flex-wrap justify-center gap-3">
            @for (color of avatarColors; track color) {
              <button
                (click)="onColorSelect(color)"
                class="w-10 h-10 rounded-full border-2 transition-all duration-300 hover:scale-110 active:scale-95 flex items-center justify-center"
                [style.backgroundColor]="color"
                [class.border-accent-light]="selectedAvatarColor() === color"
                [class.border-transparent]="selectedAvatarColor() !== color"
                [class.ring-4]="selectedAvatarColor() === color"
                [class.ring-white-glass]="selectedAvatarColor() === color"
              >
                @if (selectedAvatarColor() === color) {
                  <lucide-icon [img]="icons.checkIcon" class="w-4 h-4 text-white"></lucide-icon>
                }
              </button>
            }
          </div>
        </div>

        <form (submit)="onSubmit($event)" class="flex flex-col gap-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <app-form-input
              [field]="userCredentialsForm.firstName"
              purpose="firstName"
            ></app-form-input>
            <app-form-input
              [field]="userCredentialsForm.lastName"
              purpose="lastName"
            ></app-form-input>
          </div>
          <app-form-input
            [field]="userCredentialsForm.displayName"
            purpose="displayName"
          ></app-form-input>

          <div class="flex flex-col gap-2 mb-4">
            <span class="ml-1 text-[10px] font-bold text-accent uppercase tracking-widest"
              >Email Address</span
            >
            <div
              class="bg-surface border text-sm xs:text-base opacity-60 border-white-glass rounded-xl px-4 py-3 flex items-center justify-between"
            >
              {{ user()?.email }}
              <lucide-icon [img]="icons.lockIcon" class="w-3 h-3"></lucide-icon>
            </div>
          </div>

          <app-button [disabled]="isDisabled()" label="Save Changes" type="submit"></app-button>
        </form>
      </div>
    </div>
  </app-page-layout>
</section>
