<app-page-layout [title]="'Profile Settings'">
  <section class="flex justify-center p-6 sm:p-12">
    <div
      class="w-full max-w-2xl bg-card-bg border border-white/5 rounded-[2.5rem] shadow-2xl p-8 sm:p-12"
    >
      <div class="flex flex-col items-center mb-12">
        <div
          class="relative w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/10 transition-all duration-500"
          [style.backgroundColor]="selectedAvatarColor()"
        >
          <span class="text-3xl font-black text-white tracking-tighter">
            {{ user() | userInitial }}
          </span>
          <div
            class="absolute inset-0 rounded-full bg-linear-to-b from-white/10 to-transparent"
          ></div>
        </div>

        <p class="mt-6 mb-4 text-xs font-bold text-brand uppercase tracking-widest">
          Choose your identity color
        </p>

        <div class="flex flex-wrap justify-center gap-3">
          @for (color of avatarColors; track color) {
            <button
              (click)="onColorSelect(color)"
              class="w-10 h-10 rounded-full border-2 transition-all duration-300 hover:scale-110 active:scale-95 flex items-center justify-center"
              [style.backgroundColor]="color"
              [class.border-white]="user()?.avatarConfig?.value === color"
              [class.border-transparent]="user()?.avatarConfig?.value !== color"
              [class.ring-4]="user()?.avatarConfig?.value === color"
              [class.ring-white/10]="user()?.avatarConfig?.value === color"
            >
              @if (selectedAvatarColor() === color) {
                <lucide-icon [img]="icons.checkIcon" class="w-4 h-4 text-white"></lucide-icon>
              }
            </button>
          }
        </div>
      </div>

      <form class="space-y-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label
              for="firstName"
              class="ml-1 text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
              >First Name</label
            >
            <input
              id="firstName"
              type="text"
              [value]="user()?.firstName"
              class="bg-page-bg/30 border border-white/5 rounded-xl px-4 py-3 outline-none focus:border-brand/40 focus:ring-1 focus:ring-brand/40 transition-all"
            />
          </div>
          <div class="flex flex-col gap-2">
            <label
              for="lastName"
              class="ml-1 text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
              >Last Name</label
            >
            <input
              id="lastName"
              type="text"
              [value]="user()?.lastName"
              class="bg-page-bg/30 border border-white/5 rounded-xl px-4 py-3 outline-none focus:border-brand/40 focus:ring-1 focus:ring-brand/40 transition-all"
            />
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label
            for="displayName"
            class="ml-1 text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
            >Display Name</label
          >
          <input
            id="displayName"
            type="text"
            [value]="user()?.displayName"
            placeholder="How others see you on assets"
            class="bg-page-bg/30 border border-white/5 rounded-xl px-4 py-3 outline-none focus:border-brand/40 focus:ring-1 focus:ring-brand/40 transition-all"
          />
        </div>

        <div class="flex flex-col gap-2 opacity-60">
          <label
            for="email"
            class="ml-1 text-[10px] font-bold text-zinc-500 uppercase tracking-widest"
            >Email Address (Primary)</label
          >
          <div
            class="bg-zinc-900/40 border border-white/5 rounded-xl px-4 py-3 cursor-not-allowed flex items-center justify-between"
          >
            {{ user()?.email }}
            <lucide-icon [img]="icons.lockIcon" class="w-3 h-3 text-zinc-600"></lucide-icon>
          </div>
        </div>

        <div class="pt-6">
          <button
            type="button"
            class="w-full py-4 bg-white text-black font-bold rounded-2xl hover:bg-brand hover:text-white transition-all active:scale-[0.98] shadow-xl"
          >
            Save Profile Changes
          </button>
        </div>
      </form>
    </div>
  </section>
</app-page-layout>
