<div
  class="absolute right-0 mt-3 w-60 bg-white rounded-lg shadow-2xl z-50 border border-indigo-100 animate-in fade-in zoom-in duration-300"
>
  <div class="border-b p-1 border-gray-200">
    <div
      class="w-full h-14 ps-2 flex flex-col items-start justify-center text-indigo-950 font-bold"
    >
      {{ authUser()?.firstName }} {{ authUser()?.lastName }}
      <span class="text-xs text-slate-500">{{ authUser()?.email }}</span>
    </div>
  </div>

  <div class="border-b border-gray-200 flex flex-col gap-1 p-1">
    @for (item of menuItems; track $index) {
      <button
        class="w-full ps-2 h-10 flex items-center gap-2 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors"
        (click)="handleAction(item)"
      >
        <lucide-icon [img]="item.icon" class="w-4 h-4 stroke-[1.5px]"></lucide-icon>
        {{ item.label }}
      </button>
    }
  </div>

  <div class="p-1">
    <button
      class="w-full ps-2 h-10 flex items-center gap-2 text-red-500 text-sm rounded-md hover:bg-red-50 transition-colors"
      (click)="onLogOut()"
    >
      <lucide-icon [img]="logOutIcon" class="w-4 h-4 stroke-[1.5px]"></lucide-icon>
      Log Out
    </button>
  </div>
</div>
